name: 同步上游仓库

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/millylee/anyrouter-check-in.git

      - name: 拉取上游
        run: git fetch upstream main

      - name: 检查是否有新提交
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "上游领先 $BEHIND 个提交"

      - name: 合并上游
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit -X theirs || {
            echo "自动合并失败，使用上游版本解决冲突"
            git checkout --theirs .
            git add -A
            git commit --no-edit
          }

      - name: 恢复自定义内容
        if: steps.check.outputs.behind != '0'
        run: |
          # 保留我们的配置生成器链接
          sed -i 's|millylee.github.io/anyrouter-check-in|scotlight.github.io/anyrouter-check-in|g' README.md
          if git diff --quiet; then
            echo "无需恢复自定义内容"
          else
            git add README.md
            git commit -m "chore: restore custom secrets generator link"
          fi

      - name: 推送
        if: steps.check.outputs.behind != '0'
        run: git push origin main
